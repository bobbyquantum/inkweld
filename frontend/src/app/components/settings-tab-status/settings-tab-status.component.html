@if (isLoading()) {
  <div class="empty">
    <mat-spinner diameter="32"></mat-spinner>
  </div>
}

@if (error()) {
  <div class="empty">
    <mat-icon>error_outline</mat-icon>
    <p>{{ error() }}</p>
    <button mat-raised-button color="primary" (click)="retry.emit()">
      <mat-icon>refresh</mat-icon>
      Retry
    </button>
  </div>
}
