<h2 mat-dialog-title>
  <mat-icon>label</mat-icon>
  Tags for {{ data.elementName }}
</h2>

<mat-dialog-content>
  <app-tag-chip-list
    [elementId]="data.elementId"
    label="Tags"
    hint="Add tags to organize your content">
  </app-tag-chip-list>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Done</button>
</mat-dialog-actions>
