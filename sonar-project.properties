# SonarCloud Configuration
sonar.projectKey=bobbyquantum_inkweld
sonar.organization=bobbyquantum

# Sources and tests
sonar.sources=.
sonar.tests=backend/test,frontend/src,frontend/e2e
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/e2e/**

# Exclusions (only generated/vendored code and test files)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,frontend/src/api-client/**,**/*.spec.ts,**/*.test.ts,**/e2e/**,scripts/**,backend/scripts/**,frontend/scripts/**

# Exclude test infrastructure and files excluded from Bun/Vitest coverage (keeps other Sonar checks active)
# Keep in sync with backend/bunfig.toml coveragePathIgnorePatterns
sonar.coverage.exclusions=\
  frontend/setup-vitest.ts,\
  frontend/src/**/*.html,\
  frontend/src/**/*.scss,\
  frontend/src/testing/**,\
  frontend/src/environments/**,\
  frontend/src/main.ts,\
  frontend/src/**/*.d.ts,\
  frontend/src/**/index.ts,\
  frontend/src/**/element-sync-provider.interface.ts,\
  frontend/src/**/correction-dto.extension.ts,\
  frontend/src/**/tag.model.ts,\
  **/test-credentials.ts,\
  **/scripts/**,\
  **/test/**,\
  **/mcp/**,\
  **/durable-objects/**,\
  **/r2-storage.service.ts,\
  **/yjs.service.ts,\
  **/yjs-worker.service.ts,\
  **/src/routes/**/*.routes.ts,\
  **/image-providers/*.ts,\
  **/fal-model-metadata.service.ts,\
  **/reference-image-loader.ts,\
  **/mcp-oauth.service.ts,\
  **/image.service.ts,\
  **/image-audit.service.ts,\
  **/image-generation.service.ts,\
  **/openai-lint.service.ts,\
  **/db/schema/*.ts,\
  **/db/bun-sqlite.ts,\
  **/db/index.ts,\
  **/config/default-text-models.ts,\
  **/types/image-generation.ts,\
  **/bun-app.ts,\
  **/bun-runner.ts,\
  **/node-runner.ts,\
  docs/**,\
  frontend/electron/**,\
  frontend/playwright*.config.ts,\
  frontend/vitest*.config.ts,\
  frontend/eslint-template-parser-compat.mjs,\
  frontend/functions/**,\
  backend/src/setup-wizard.ts,\
  backend/src/worker-app.ts,\
  backend/src/node-app.ts,\
  backend/src/config/runtime.ts,\
  **/db/better-sqlite.ts,\
  **/db/d1.ts,\
  **/database.better-sqlite.middleware.ts,\
  **/database.d1.middleware.ts

# Exclude intentionally duplicated cross-runtime utilities from copy-paste detection.
# backend and frontend can't share source files across build systems (Bun vs Angular/Node).
sonar.cpd.exclusions=**/utils/string-utils.ts

# Coverage reports (LCOV format)
sonar.javascript.lcov.reportPaths=frontend/coverage/inkweld-frontend/lcov.info,backend/coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=frontend/tsconfig.json,backend/tsconfig.json

# Disable PL/SQL analyzer (no Oracle DB in this project)
sonar.plsql.file.suffixes=none

# Suppress hardcoded-credentials rule (S2068) on centralised test credential files only.
# These files contain intentionally fake/test-only values — not real secrets.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/test-credentials.ts
# Suppress "prefer node: prefix" rule — project uses bare imports (fs, path) by convention.
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S7772
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.ts
