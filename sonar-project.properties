# SonarCloud Configuration
sonar.projectKey=bobbyquantum_inkweld
sonar.organization=bobbyquantum

# Sources and tests
sonar.sources=.
sonar.tests=backend/test,frontend/src,frontend/e2e
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/e2e/**

# Exclusions (only generated/vendored code and test files)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,frontend/src/api-client/**,**/*.spec.ts,**/*.test.ts,**/e2e/**

# Coverage reports (LCOV format)
sonar.javascript.lcov.reportPaths=frontend/coverage/inkweld-frontend/lcov.info,backend/coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=frontend/tsconfig.json,backend/tsconfig.json

# Disable PL/SQL analyzer (no Oracle DB in this project)
sonar.plsql.file.suffixes=none
