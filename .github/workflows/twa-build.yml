name: TWA Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build target'
        required: true
        type: choice
        options:
          - preview
          - prod
      package_name:
        description: 'Package name (default: app.inkweld)'
        required: false
        type: string
        default: 'app.inkweld'
      preview_host:
        description: 'Preview host — no protocol (default: preview.inkweld.app)'
        required: false
        type: string
        default: 'preview.inkweld.app'
      prod_host:
        description: 'Production host — no protocol (default: inkweld.app)'
        required: false
        type: string
        default: 'inkweld.app'

concurrency:
  group: twa-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ github.event.inputs.environment }} TWA
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Apply build config overrides
        working-directory: android
        run: |
          sed -i "s|preview\.inkweld\.app|${{ github.event.inputs.preview_host }}|g" app/build.gradle.kts
          sed -i "s|inkweld\.app|${{ github.event.inputs.prod_host }}|g" app/build.gradle.kts
          sed -i 's|namespace = "app\.inkweld"|namespace = "${{ github.event.inputs.package_name }}"|' app/build.gradle.kts
          sed -i 's|applicationId = "app\.inkweld"|applicationId = "${{ github.event.inputs.package_name }}"|' app/build.gradle.kts

      - name: Decode keystore
        env:
          TWA_KEYSTORE_BASE64: ${{ secrets.TWA_KEYSTORE_BASE64 }}
        run: mkdir -p android && printf '%s' "${TWA_KEYSTORE_BASE64}" | base64 -d > android/inkweld-release.keystore

      - name: Build
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PATH: inkweld-release.keystore
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.TWA_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.TWA_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.TWA_KEY_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            ./gradlew bundleProdRelease
          else
            ./gradlew assemblePreviewRelease
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: inkweld-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: |
            android/app/build/outputs/bundle/${{ github.event.inputs.environment }}Release/*.aab
            android/app/build/outputs/apk/${{ github.event.inputs.environment }}/release/*.apk
