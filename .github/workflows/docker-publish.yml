name: Manual Docker Publish

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g., v1.0.0, beta, etc.)"
        required: false
        default: "manual"
        type: string
      push_latest:
        description: "Also tag as latest"
        required: false
        default: false
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          TAGS="ghcr.io/${REPO_OWNER}/inkweld:${INPUT_TAG}"
          if [ "${INPUT_PUSH_LATEST}" = "true" ]; then
            TAGS="$TAGS,ghcr.io/${REPO_OWNER}/inkweld:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
